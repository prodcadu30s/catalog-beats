backend:
  name: github
  repo: prodcadu30s/catalog-beats
  branch: main
  base_url: https://auth.decapcms.org
  auth_endpoint: auth

media_folder: "previews"
public_folder: "/previews"

publish_mode: simple

collections:
  - name: "conteudo"
    label: "Conteúdo do Site"
    files:
      - name: "site"
        label: "Config do Site"
        file: "site.json"
        format: "json"
        fields:
          - label: "Marca"
            name: "brand"
            widget: "object"
            fields:
              - { label: "Nome", name: "name", widget: "string" }
              - { label: "Subtítulo", name: "subtitle", widget: "string" }
              - label: "Logo (upload)"
                name: "logo_url"
                widget: "file"
                required: false
              - { label: "Instagram URL", name: "instagram_url", widget: "string", required: false }
              - { label: "Email", name: "email", widget: "string", required: false }
              - { label: "WhatsApp URL", name: "whatsapp_url", widget: "string", required: false }

          - label: "Home"
            name: "home"
            widget: "object"
            fields:
              - { label: "Título (H1)", name: "headline", widget: "string" }
              - { label: "Texto", name: "subtext", widget: "text" }

          - label: "Página de Licenças"
            name: "licenses_page"
            widget: "object"
            fields:
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Introdução", name: "intro", widget: "text", required: false }
              - label: "Seções"
                name: "sections"
                widget: "list"
                fields:
                  - { label: "Título da seção", name: "title", widget: "string" }
                  - { label: "Texto (use quebras de linha e '- ' para bullets)", name: "body", widget: "text" }
              - { label: "Notas finais", name: "notes", widget: "text", required: false }

      - name: "beats"
        label: "Beats"
        file: "beats.json"
        format: "json"
        fields:
          - label: "Beats"
            name: "beats"
            widget: "list"
            summary: "{{fields.title}} • {{fields.style}} • {{fields.bpm}} BPM"
            fields:
              - { label: "ID (sem espaços)", name: "id", widget: "string", hint: "ex: trap-night-140" }
              - { label: "Título", name: "title", widget: "string" }
              - { label: "Estilo", name: "style", widget: "string", hint: "ex: Trap, Drill, Boom Bap" }
              - { label: "BPM", name: "bpm", widget: "number", value_type: "int", min: 40, max: 220 }
              - { label: "Key", name: "key", widget: "string", required: false, hint: "ex: Dm" }

              - label: "Tags (type beat) — ex.: Drake, Travis Scott"
                name: "tags"
                widget: "list"
                required: false
                field: { label: "Tag", name: "tag", widget: "string" }

              - { label: "Tagged (preview com tag)", name: "tagged", widget: "boolean", default: true }
              - { label: "Data", name: "date", widget: "datetime", format: "YYYY-MM-DD", time_format: false }

              - label: "Preview (MP3) — arraste e solte"
                name: "preview_url"
                widget: "file"
                media_library:
                  config:
                    multiple: false

              - { label: "Link BASIC (Pix/Cartão)", name: "buy_basic_url", widget: "string", required: false }
              - { label: "Link PREMIUM (Pix/Cartão)", name: "buy_premium_url", widget: "string", required: false }
              - { label: "Link EXCLUSIVE (Pix/Cartão)", name: "buy_exclusive_url", widget: "string", required: false }
